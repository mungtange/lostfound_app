<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분실물 찾기 - 공유 버전</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .app {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: #f0f0f0;
            border-radius: 15px; cursor: pointer; font-weight: 600;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .item-card {
            background: white; padding: 15px; border-radius: 20px;
            margin-bottom: 15px; border-left: 5px solid #667eea;
            position: relative;
        }
        .item-photo {
            width: 100%; height: 200px; border-radius: 15px;
            overflow: hidden; margin-bottom: 12px; cursor: pointer;
            background: #f0f0f0;
        }
        .item-photo img { width: 100%; height: 100%; object-fit: cover; }
        .item-video {
            width: 100%; height: 200px; border-radius: 15px;
            overflow: hidden; margin-bottom: 12px; cursor: pointer;
            background: #000; position: relative;
        }
        .item-video video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .item-video::after {
            content: "▶"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 48px;
            color: white; text-shadow: 0 0 10px black; opacity: 0.8;
        }
        .item-card h3 { margin-bottom: 8px; color: #333; }
        .item-card p { color: #666; margin: 5px 0; font-size: 14px; }
        .contact {
            color: #667eea; font-weight: bold; margin-top: 10px;
            background: #f8f9ff; padding: 8px; border-radius: 10px;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .delete-btn {
            background: #ff6b6b; color: white; border: none;
            padding: 8px 15px; border-radius: 12px; cursor: pointer;
        }
        .admin-delete-btn {
            background: #dc3545; color: white; border: none;
            padding: 8px 15px; border-radius: 12px; cursor: pointer;
            font-weight: bold;
        }
        .report-btn {
            background: #ffc107; color: #333; border: none;
            padding: 8px 15px; border-radius: 12px; cursor: pointer;
        }
        .report-btn.reported {
            background: #6c757d;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .blocked-badge {
            background: #dc3545;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .admin-badge {
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
        .form {
            background: #f8f9fa; padding: 20px; border-radius: 20px;
        }
        .form input, .form select, .form textarea {
            width: 100%; padding: 12px; margin-bottom: 12px;
            border: 2px solid #e0e0e0; border-radius: 12px;
        }
        .form button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer;
        }
        .upload-label {
            font-size: 14px; font-weight: 600; color: #555;
            margin-bottom: 8px; margin-top: 5px;
        }
        .photo-preview, .video-preview {
            width: 100%; height: 150px; background: #f0f0f0;
            border-radius: 15px; border: 2px dashed #ccc;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 10px;
        }
        .empty-message { text-align: center; padding: 40px; color: #999; }
        input[type="tel"] { font-family: monospace; font-size: 18px; }
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); cursor: pointer;
        }
        .modal-content-img, .modal-content-video {
            max-width: 90%; max-height: 90%; margin: auto; display: block;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 10px;
        }
        .close-modal {
            position: absolute; top: 20px; right: 35px;
            color: white; font-size: 40px; cursor: pointer;
        }
        .loading { text-align: center; padding: 20px; color: #888; }
        
        /* 모달 스타일 */
        .password-modal, .admin-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
        }
        .password-modal-content, .admin-modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }
        .password-modal-content input, .admin-modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        .password-modal-content button, .admin-modal-content button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .confirm-btn { background: #667eea; color: white; }
        .cancel-btn { background: #ccc; color: #333; }
        .danger-btn { background: #dc3545; color: white; }
        
        /* 관리자 전용 섹션 */
        .admin-section {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 15px;
        }
        .admin-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .admin-logout-btn {
            background: #6c757d;
            margin-top: 10px;
        }
        .reported-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .reported-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .unblock-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .admin-delete-small {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>🔍 분실물 찾기</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('lost')">📱 분실물</button>
            <button class="tab-btn" onclick="showTab('found')">🎁 습득물</button>
            <button class="tab-btn" onclick="showTab('add')">➕ 등록</button>
            <button class="tab-btn" onclick="showTab('admin')">👑 관리</button>
        </div>

        <div id="lostTab" class="tab-content active">
            <div id="lostList" class="item-list">
                <div class="loading">⏳ 불러오는 중...</div>
            </div>
        </div>

        <div id="foundTab" class="tab-content">
            <div id="foundList" class="item-list">
                <div class="loading">⏳ 불러오는 중...</div>
            </div>
        </div>

        <div id="addTab" class="tab-content">
            <div class="form">
                <select id="itemType">
                    <option value="lost">❌ 분실했어요</option>
                    <option value="found">✅ 찾았어요</option>
                </select>
                <input type="text" id="title" placeholder="물건 이름">
                <textarea id="desc" placeholder="상세 설명"></textarea>
                <input type="text" id="location" placeholder="📍 위치">
                <input type="tel" id="phone" placeholder="📞 연락처 (010-1234-5678)">
                
                <div class="upload-label">🔒 삭제 비밀번호 (4자리 숫자)</div>
                <input type="password" id="password" placeholder="삭제할 때 필요한 비밀번호" maxlength="4" inputmode="numeric">
                
                <div class="upload-label">📸 사진 (선택)</div>
                <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()">
                    📸 사진 추가하기
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
                
                <div class="upload-label">🎥 영상 (선택, 50MB 제한)</div>
                <div class="video-preview" id="videoPreview" onclick="document.getElementById('videoInput').click()">
                    🎥 영상 추가하기
                </div>
                <input type="file" id="videoInput" accept="video/*" style="display:none" onchange="previewVideo(this)">
                
                <button onclick="addItem()">✨ 등록하기 ✨</button>
            </div>
        </div>

        <div id="adminTab" class="tab-content">
            <div class="admin-section">
                <h3>👑 관리자 메뉴</h3>
                <div id="adminLoginArea">
                    <button class="admin-btn" onclick="showAdminLogin()">🔐 관리자 로그인</button>
                </div>
                <div id="adminPanel" style="display: none; margin-top: 15px;">
                    <button class="admin-btn admin-logout-btn" onclick="adminLogout()">🚪 로그아웃</button>
                    <h4 style="margin-top: 15px;">🚫 신고된 게시물</h4>
                    <div id="reportedList" class="reported-list"></div>
                    <h4 style="margin-top: 15px;">⛔ 차단된 전화번호</h4>
                    <div id="blockedList" class="reported-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 비밀번호 확인 모달 (삭제용) -->
    <div id="passwordModal" class="password-modal">
        <div class="password-modal-content">
            <h3>🔒 비밀번호 확인</h3>
            <p>이 글을 삭제하려면<br>비밀번호를 입력하세요.</p>
            <input type="password" id="deletePassword" placeholder="비밀번호 4자리" maxlength="4" inputmode="numeric">
            <div>
                <button class="confirm-btn" onclick="confirmDelete()">확인</button>
                <button class="cancel-btn" onclick="closePasswordModal()">취소</button>
            </div>
        </div>
    </div>

    <!-- 관리자 로그인 모달 -->
    <div id="adminModal" class="admin-modal">
        <div class="admin-modal-content">
            <h3>👑 관리자 로그인</h3>
            <p>관리자 비밀번호를 입력하세요.</p>
            <input type="password" id="adminPassword" placeholder="관리자 비밀번호">
            <div>
                <button class="confirm-btn" onclick="adminLogin()">로그인</button>
                <button class="cancel-btn" onclick="closeAdminModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="mediaModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <div id="modalContent"></div>
    </div>

    <script>
        // ============ 관리자 설정 ============
        const ADMIN_PASSWORD = "admin1234";
        let isAdminLoggedIn = false;
        
        // ============ Firebase 설정 ============
        const firebaseConfig = {
            apiKey: "AIzaSyDcaXysUHS5MiqPLFEmdqjhWD7h8tPCUKQ",
            authDomain: "korean-e4be8.firebaseapp.com",
            projectId: "korean-e4be8",
            storageBucket: "korean-e4be8.firebasestorage.app",
            messagingSenderId: "14177850866",
            appId: "1:14177850866:web:6f83f59f281ecf5cf2c76b",
            measurementId: "G-ZC7S0VK81X"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        let currentPhotoFile = null;
        let currentVideoFile = null;
        let pendingDeleteId = null;
        
        let blockedPhones = [];
        let reportedItems = [];
        
        // ============ 관리자 함수 ============
        
        function showAdminLogin() {
            document.getElementById('adminModal').style.display = 'flex';
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }
        
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdminLoggedIn = true;
                document.getElementById('adminLoginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                closeAdminModal();
                loadAdminData();
                alert('👑 관리자 모드로 전환되었습니다.\n이제 모든 게시물 옆에 "관리자 삭제" 버튼이 표시됩니다.');
                loadItems(); // UI 갱신
            } else {
                alert('❌ 관리자 비밀번호가 틀렸습니다.');
                document.getElementById('adminPassword').value = '';
            }
        }
        
        function adminLogout() {
            isAdminLoggedIn = false;
            document.getElementById('adminLoginArea').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            alert('관리자 모드에서 로그아웃되었습니다.');
            loadItems(); // UI 갱신
        }
        
        // 관리자용 강제 삭제 (비밀번호 불필요)
        async function adminForceDelete(itemId, itemTitle) {
            if (!isAdminLoggedIn) {
                alert('관리자 권한이 필요합니다.');
                return;
            }
            
            if (confirm(`⚠️ 관리자 권한으로 "${itemTitle}" 게시물을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
                await db.collection('items').doc(itemId).delete();
                alert('✅ 게시물이 삭제되었습니다.');
                loadItems();
                if (isAdminLoggedIn) loadAdminData();
            }
        }
        
        // 차단 목록 불러오기
        async function loadBlockedList() {
            const snapshot = await db.collection('blocked').doc('phones').get();
            if (snapshot.exists) {
                blockedPhones = snapshot.data().list || [];
            } else {
                blockedPhones = [];
            }
        }
        
        // 신고된 글 목록 불러오기
        async function loadReportedItems() {
            const snapshot = await db.collection('reports').doc('items').get();
            if (snapshot.exists) {
                reportedItems = snapshot.data().list || [];
            } else {
                reportedItems = [];
            }
        }
        
        function isPhoneBlocked(phone) {
            if (!phone) return false;
            const phoneNumbers = phone.replace(/[^\d]/g, '');
            return blockedPhones.includes(phoneNumbers);
        }
        
        // 신고하기
        async function reportItem(itemId, itemPhone) {
            if (reportedItems.includes(itemId)) {
                alert('⚠️ 이미 신고된 게시물입니다.');
                return;
            }
            
            const reason = prompt('신고 사유를 입력해주세요:\n(예: 욕설, 광고, 반복 게시 등)', '부적절한 내용');
            if (!reason) return;
            
            reportedItems.push(itemId);
            await db.collection('reports').doc('items').set({ list: reportedItems });
            
            const reportCountRef = db.collection('reportCounts').doc(itemId);
            const reportCountDoc = await reportCountRef.get();
            let count = 1;
            if (reportCountDoc.exists) {
                count = (reportCountDoc.data().count || 0) + 1;
            }
            await reportCountRef.set({ count: count, lastReported: Date.now() });
            
            if (count >= 3) {
                const phoneNumbers = itemPhone.replace(/[^\d]/g, '');
                if (phoneNumbers && !blockedPhones.includes(phoneNumbers)) {
                    blockedPhones.push(phoneNumbers);
                    await db.collection('blocked').doc('phones').set({ list: blockedPhones });
                    alert(`⚠️ 해당 전화번호(${phoneNumbers})가 3회 신고되어 자동 차단되었습니다.`);
                }
                await db.collection('items').doc(itemId).delete();
                alert('신고 누적으로 게시물이 삭제되었습니다.');
            } else {
                alert(`✅ 신고가 접수되었습니다. (현재 ${count}/3회)\n3회 누적 시 자동 차단됩니다.`);
            }
            
            if (isAdminLoggedIn) loadAdminData();
            loadItems();
        }
        
        // 차단 해제
        async function unblockPhone(phoneNumber) {
            if (!isAdminLoggedIn) {
                alert('관리자 권한이 필요합니다.');
                return;
            }
            
            blockedPhones = blockedPhones.filter(p => p !== phoneNumber);
            await db.collection('blocked').doc('phones').set({ list: blockedPhones });
            alert(`✅ ${phoneNumber} 차단이 해제되었습니다.`);
            loadAdminData();
            loadItems();
        }
        
        // 신고 무시
        async function ignoreReport(itemId) {
            if (!isAdminLoggedIn) {
                alert('관리자 권한이 필요합니다.');
                return;
            }
            
            reportedItems = reportedItems.filter(id => id !== itemId);
            await db.collection('reports').doc('items').set({ list: reportedItems });
            alert('✅ 신고가 무시 처리되었습니다.');
            loadAdminData();
        }
        
        // 관리자 데이터 로드
        async function loadAdminData() {
            if (!isAdminLoggedIn) return;
            
            await loadReportedItems();
            await loadBlockedList();
            
            const reportedDiv = document.getElementById('reportedList');
            if (reportedItems.length === 0) {
                reportedDiv.innerHTML = '<div style="padding: 10px; color:#999;">📭 신고된 게시물이 없습니다</div>';
            } else {
                let html = '';
                for (const itemId of reportedItems) {
                    const doc = await db.collection('items').doc(itemId).get();
                    if (doc.exists) {
                        const item = doc.data();
                        html += `
                            <div class="reported-item">
                                <div>
                                    <strong>${escapeHtml(item.title)}</strong><br>
                                    <small>📞 ${escapeHtml(item.phone)}</small>
                                </div>
                                <div style="display: flex; gap: 5px;">
                                    <button class="unblock-btn" onclick="ignoreReport('${itemId}')">✅ 무시</button>
                                    <button class="admin-delete-small" onclick="adminForceDelete('${itemId}', '${escapeHtml(item.title)}')">🗑️ 삭제</button>
                                </div>
                            </div>
                        `;
                    } else {
                        reportedItems = reportedItems.filter(id => id !== itemId);
                        await db.collection('reports').doc('items').set({ list: reportedItems });
                    }
                }
                reportedDiv.innerHTML = html || '<div style="padding: 10px; color:#999;">📭 신고된 게시물이 없습니다</div>';
            }
            
            const blockedDiv = document.getElementById('blockedList');
            if (blockedPhones.length === 0) {
                blockedDiv.innerHTML = '<div style="padding: 10px; color:#999;">📭 차단된 번호가 없습니다</div>';
            } else {
                blockedDiv.innerHTML = blockedPhones.map(phone => `
                    <div class="reported-item">
                        <span>📞 ${phone}</span>
                        <button class="unblock-btn" onclick="unblockPhone('${phone}')">🔓 차단 해제</button>
                    </div>
                `).join('');
            }
        }
        
        // ============ 기존 함수들 ============
        
        function formatPhoneNumber(value) {
            let numbers = value.replace(/[^\d]/g, '');
            if (numbers.length > 11) numbers = numbers.slice(0, 11);
            if (numbers.length <= 3) return numbers;
            if (numbers.length <= 7) return `${numbers.slice(0, 3)}-${numbers.slice(3)}`;
            return `${numbers.slice(0, 3)}-${numbers.slice(3, 7)}-${numbers.slice(7, 11)}`;
        }
        
        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                currentPhotoFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    alert('⚠️ 영상 용량이 50MB를 초과합니다.');
                    input.value = '';
                    return;
                }
                currentVideoFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('videoPreview').innerHTML = `<video src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;"></video>`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        async function loadItems() {
            await loadBlockedList();
            
            db.collection('items').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                const items = [];
                snapshot.forEach(doc => {
                    items.push({ id: doc.id, ...doc.data() });
                });
                const filteredItems = items.filter(item => !isPhoneBlocked(item.phone));
                displayItems(filteredItems);
            });
        }
        
        function showMediaModal(url, type) {
            const modal = document.getElementById('mediaModal');
            const modalContent = document.getElementById('modalContent');
            if (type === 'image') {
                modalContent.innerHTML = `<img class="modal-content-img" src="${url}">`;
            } else {
                modalContent.innerHTML = `<video class="modal-content-video" src="${url}" controls autoplay></video>`;
            }
            modal.style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('mediaModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function requestDelete(id) {
            pendingDeleteId = id;
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('deletePassword').value = '';
        }
        
        async function confirmDelete() {
            const enteredPassword = document.getElementById('deletePassword').value;
            if (!enteredPassword) {
                alert('비밀번호를 입력하세요!');
                return;
            }
            
            const doc = await db.collection('items').doc(pendingDeleteId).get();
            const item = doc.data();
            
            if (item && item.password === enteredPassword) {
                await db.collection('items').doc(pendingDeleteId).delete();
                alert('삭제되었습니다.');
                closePasswordModal();
            } else {
                alert('❌ 비밀번호가 일치하지 않습니다!');
                document.getElementById('deletePassword').value = '';
            }
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            pendingDeleteId = null;
        }
        
        function displayItems(items) {
            const lostItems = items.filter(i => i.type === 'lost');
            const foundItems = items.filter(i => i.type === 'found');
            
            const makeItemHTML = (item, emoji) => {
                const isReported = reportedItems.includes(item.id);
                return `
                    <div class="item-card">
                        ${item.photoUrl ? `<div class="item-photo" onclick="showMediaModal('${item.photoUrl}', 'image')"><img src="${item.photoUrl}"></div>` : ''}
                        ${item.videoUrl ? `<div class="item-video" onclick="showMediaModal('${item.videoUrl}', 'video')"><video src="${item.videoUrl}" muted></video></div>` : ''}
                        <h3>${emoji} ${escapeHtml(item.title)} ${isAdminLoggedIn ? '<span class="admin-badge">👑 관리자</span>' : ''}</h3>
                        <p>📝 ${escapeHtml(item.desc)}</p>
                        <p>📍 ${escapeHtml(item.location)}</p>
                        <p class="contact">📞 ${escapeHtml(item.phone)}</p>
                        <div class="button-group">
                            <button class="delete-btn" onclick="requestDelete('${item.id}')">🗑️ 삭제 (비밀번호)</button>
                            ${isAdminLoggedIn ? `<button class="admin-delete-btn" onclick="adminForceDelete('${item.id}', '${escapeHtml(item.title)}')">👑 관리자 삭제</button>` : ''}
                            <button class="report-btn ${isReported ? 'reported' : ''}" 
                                ${isReported ? 'disabled' : `onclick="reportItem('${item.id}', '${item.phone.replace(/'/g, "\\'")}')"`}>
                                ${isReported ? '✓ 신고됨' : '🚨 신고'}
                            </button>
                        </div>
                    </div>
                `;
            };
            
            const lostList = document.getElementById('lostList');
            if (lostItems.length === 0) {
                lostList.innerHTML = '<div class="empty-message">📭 등록된 분실물이 없습니다</div>';
            } else {
                lostList.innerHTML = lostItems.map(item => makeItemHTML(item, '❌')).join('');
            }
            
            const foundList = document.getElementById('foundList');
            if (foundItems.length === 0) {
                foundList.innerHTML = '<div class="empty-message">📭 등록된 습득물이 없습니다</div>';
            } else {
                foundList.innerHTML = foundItems.map(item => makeItemHTML(item, '✅')).join('');
            }
        }
        
        async function addItem() {
            const type = document.getElementById('itemType').value;
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('desc').value.trim();
            const location = document.getElementById('location').value.trim();
            let phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value.trim();
            const phoneNumbersOnly = phone.replace(/[^\d]/g, '');
            
            if (!title) { alert('물건 이름을 입력해주세요!'); return; }
            if (!desc) { alert('설명을 입력해주세요!'); return; }
            if (!location) { alert('위치를 입력해주세요!'); return; }
            if (!phoneNumbersOnly) { alert('전화번호를 입력해주세요!'); return; }
            if (phoneNumbersOnly.length < 10 || phoneNumbersOnly.length > 11) {
                alert('전화번호는 10~11자리 숫자여야 합니다.');
                return;
            }
            if (!password || password.length !== 4 || !/^\d+$/.test(password)) {
                alert('🔒 삭제 비밀번호를 4자리 숫자로 입력해주세요!');
                return;
            }
            
            if (isPhoneBlocked(phone)) {
                alert('⛔ 이 전화번호는 신고 누적으로 차단되어 게시물을 등록할 수 없습니다.');
                return;
            }
            
            let photoUrl = null;
            let videoUrl = null;
            
            if (currentPhotoFile) {
                const fileName = Date.now() + '_photo_' + currentPhotoFile.name;
                const storageRef = storage.ref('photos/' + fileName);
                await storageRef.put(currentPhotoFile);
                photoUrl = await storageRef.getDownloadURL();
            }
            
            if (currentVideoFile) {
                const fileName = Date.now() + '_video_' + currentVideoFile.name;
                const storageRef = storage.ref('videos/' + fileName);
                await storageRef.put(currentVideoFile);
                videoUrl = await storageRef.getDownloadURL();
            }
            
            await db.collection('items').add({
                type: type, title: title, desc: desc, location: location,
                phone: phone, password: password, photoUrl: photoUrl,
                videoUrl: videoUrl, timestamp: Date.now(), date: new Date().toLocaleString()
            });
            
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('location').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('password').value = '';
            document.getElementById('photoPreview').innerHTML = '📸 사진 추가하기';
            document.getElementById('videoPreview').innerHTML = '🎥 영상 추가하기';
            currentPhotoFile = null;
            currentVideoFile = null;
            
            alert('✅ 등록되었습니다!');
            showTab('lost');
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            const btns = document.querySelectorAll('.tab-btn');
            if (tab === 'lost') btns[0].classList.add('active');
            else if (tab === 'found') btns[1].classList.add('active');
            else if (tab === 'add') btns[2].classList.add('active');
            else btns[3].classList.add('active');
        }
        
        document.getElementById('phone')?.addEventListener('input', function(e) {
            const cursorPos = e.target.selectionStart;
            const formatted = formatPhoneNumber(e.target.value);
            if (formatted !== e.target.value) {
                const diff = formatted.length - e.target.value.length;
                e.target.value = formatted;
                e.target.setSelectionRange(cursorPos + diff, cursorPos + diff);
            }
        });
        
        document.getElementById('password')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
        });
        document.getElementById('deletePassword')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
        });
        
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        
        loadBlockedList();
        loadReportedItems();
        loadItems();
    </script>
</body>
</html>
