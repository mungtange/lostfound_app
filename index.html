<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>분실물 찾기</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LostFound">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>🔍 분실물 찾기</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('lost', event)">📱 분실물</button>
            <button class="tab-btn" onclick="showTab('found', event)">🎁 습득물</button>
            <button class="tab-btn" onclick="showTab('add', event)">➕ 등록</button>
        </div>

        <div id="lostTab" class="tab-content active">
            <div id="lostList" class="item-list"></div>
        </div>

        <div id="foundTab" class="tab-content">
            <div id="foundList" class="item-list"></div>
        </div>

        <div id="addTab" class="tab-content">
            <div class="form">
                <select id="itemType">
                    <option value="lost">❌ 분실했어요</option>
                    <option value="found">✅ 찾았어요</option>
                </select>
                <input type="text" id="title" placeholder="물건 이름 (예: 지갑, 핸드폰)">
                <textarea id="desc" placeholder="상세 설명 (색상, 브랜드, 특징 등)"></textarea>
                <input type="text" id="location" placeholder="📍 잃어버린/찾은 장소">
                <input type="tel" id="phone" placeholder="📞 연락처 (010-1234-5678)" maxlength="13">
                
                <!-- 사진 업로드 -->
                <div class="photo-upload">
                    <div class="upload-label">📸 사진 (선택)</div>
                    <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()">
                        <div class="photo-placeholder">
                            📸
                            <span>사진 추가하기</span>
                        </div>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
                </div>
                
                <!-- 영상 업로드 (새로 추가!) -->
                <div class="video-upload">
                    <div class="upload-label">🎥 영상 (선택, 30초 이내 추천)</div>
                    <div class="video-preview" id="videoPreview" onclick="document.getElementById('videoInput').click()">
                        <div class="video-placeholder">
                            🎥
                            <span>영상 추가하기</span>
                        </div>
                    </div>
                    <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="previewVideo(this)">
                </div>
                
                <button onclick="addItem()">✨ 등록하기 ✨</button>
            </div>
        </div>
    </div>

    <!-- 미디어 확대 모달 -->
    <div id="mediaModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <div id="modalContent"></div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker 등록 성공:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker 등록 실패:', error);
                    });
            });
        }
    </script>
</body>
</html>
